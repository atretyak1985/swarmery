name: swarmery-release

# Cut a versioned swarmery build by pushing a tag:
#   git tag swarmery-v0.1.0 && git push origin swarmery-v0.1.0
# The job builds the daemon for the common host targets and publishes them on a
# GitHub Release, giving `tools/swarmery` a fixed rollback point (see the
# "Rollback" section of tools/swarmery/README.md).

on:
  push:
    tags: ['swarmery-v*']

defaults:
  run:
    working-directory: tools/swarmery

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload binaries
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: tools/swarmery/go.mod
          cache-dependency-path: tools/swarmery/go.sum

      - name: Build web
        working-directory: tools/swarmery/web
        run: |
          npm ci
          npm run build

      - name: Cross-compile binaries
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#swarmery-}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/swarmery-${version}-${os}-${arch}"
            echo "building $out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/swarmery
          done
          ( cd dist && sha256sum swarmery-* > SHA256SUMS )

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/swarmery-* dist/SHA256SUMS
