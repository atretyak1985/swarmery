name: swarmery-ci

on:
  push:
    branches: [main, 'feat/**']
    paths: ['tools/swarmery/**', '.github/workflows/swarmery-ci.yml']
  pull_request:
    branches: [main, 'feat/**']
    paths: ['tools/swarmery/**', '.github/workflows/swarmery-ci.yml']

defaults:
  run:
    working-directory: tools/swarmery

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tools/swarmery/web/package-lock.json

      - name: Build web
        working-directory: tools/swarmery/web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: tools/swarmery/go.mod
          cache-dependency-path: tools/swarmery/go.sum
          check-latest: true

      - name: Vet
        run: go vet ./...

      - name: Test (with coverage floor)
        run: |
          set -euo pipefail
          go test -coverprofile=coverage.out ./...
          # Coverage-gate scope: the floor measures unit-testable logic only.
          # The CLI entrypoint (cmd/swarmery) and go:embed-only packages
          # (web, internal/docsfs) carry no unit-testable statements — they are
          # exercised via the daemon/integration path — so they are excluded
          # from the denominator to keep the floor honest and stable.
          grep -vE '/(cmd/swarmery|web|internal/docsfs)/' coverage.out > coverage.gated.out
          total=$(go tool cover -func=coverage.gated.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "gated coverage (excl. entrypoint & embed): ${total}%"
          # Regression floor. Raise as coverage improves;
          # never set it above the live number or CI blocks legitimate work.
          floor=70.0
          awk -v t="$total" -v f="$floor" 'BEGIN { exit (t+0 >= f+0) ? 0 : 1 }' \
            || { echo "coverage ${total}% is below floor ${floor}%"; exit 1; }

      - name: Build binary
        run: go build -o swarmery ./cmd/swarmery
